<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sapa - Firebase Live</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: { colors: { sapa: { light: '#14b8a6', dark: '#0f766e', accent: '#facc15' } }, boxShadow: { '3d': '0 4px 0 0 rgba(0, 0, 0, 0.2)', '3d-active': '0 0px 0 0 rgba(0, 0, 0, 0.2)' } }
            }
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body, html { overscroll-behavior-y: contain; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(156, 163, 175, 0.5); border-radius: 10px; }
        
        .bg-animated { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #f3f4f6; z-index: -2; transition: background 0.5s ease; }
        .dark .bg-animated { background: #111827; }
        .blob { position: absolute; border-radius: 50%; filter: blur(80px); z-index: -1; animation: float 10s infinite ease-in-out alternate; }
        .blob-1 { top: -10%; left: -10%; width: 350px; height: 350px; background: rgba(20, 184, 166, 0.4); }
        .blob-2 { bottom: -10%; right: -10%; width: 350px; height: 350px; background: rgba(250, 204, 21, 0.3); animation-delay: -5s; }
        
        .glass-panel { background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .dark .glass-panel { background: rgba(31, 41, 55, 0.65); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        .btn-3d { transition: all 0.1s ease; } .btn-3d:active { transform: translateY(4px); }
        .chat-pattern { background-image: radial-gradient(rgba(0,0,0,0.1) 1px, transparent 1px); background-size: 20px 20px; }
        .dark .chat-pattern { background-image: radial-gradient(rgba(255,255,255,0.1) 1px, transparent 1px); }
        
        @keyframes slideUpPopup { from { opacity: 0; transform: translateY(20px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .animate-popup { animation: slideUpPopup 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        .media-bubble img, .media-bubble video { max-width: 220px; max-height: 280px; object-fit: cover; border-radius: 10px; cursor: pointer; }
        .sticker-bubble { font-size: 5rem; line-height: 1; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2)); animation: bounceSticker 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .custom-sticker-bubble { max-width: 120px; max-height: 120px; object-fit: contain; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2)); animation: bounceSticker 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes bounceSticker { 0% { transform: scale(0); } 80% { transform: scale(1.2); } 100% { transform: scale(1); } }
        
        .safe-bottom { padding-bottom: calc(2rem + env(safe-area-inset-bottom)); }
        
        /* Notifikasi Toast Masuk */
        #in-app-notification { transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .notif-hidden { transform: translateY(-150%); }
        .notif-visible { transform: translateY(0); }
    </style>
</head>
<body class="text-gray-800 dark:text-gray-200 antialiased h-screen w-full flex items-center justify-center overflow-hidden font-sans selection:bg-sapa-light selection:text-white transition-colors duration-300">

    <!-- SCRIPT FIREBASE ASLI (MENGGUNAKAN KONFIGURASI ANDA) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Konfigurasi Anda!
        const firebaseConfig = {
            apiKey: "AIzaSyB_RgyA1deRZP6-gCJEt_WVjKyytrUPfiU",
            authDomain: "sapa-28f40.firebaseapp.com",
            projectId: "sapa-28f40",
            storageBucket: "sapa-28f40.firebasestorage.app",
            messagingSenderId: "6147796257",
            appId: "1:6147796257:web:24c06231dd8c193cfde260"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let myPhoneNumber = localStorage.getItem('sapa_phone') || null;
        let activeTargetPhone = null;
        let unsubscribeInbox = null;
        let unsubscribeMessages = null;
        let unreadNotifPhone = null;

        // --- TEMA & BACKGROUND ---
        function initTheme() {
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
            document.getElementById('theme-icon').className = document.documentElement.classList.contains('dark') ? 'fas fa-sun text-yellow-400' : 'fas fa-moon text-gray-600';
        }
        window.toggleTheme = function() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
            document.getElementById('theme-icon').className = document.documentElement.classList.contains('dark') ? 'fas fa-sun text-yellow-400' : 'fas fa-moon text-gray-600';
            if(activeTargetPhone && !document.getElementById('screen-chat').classList.contains('hidden')) applyDynamicBackground(activeTargetPhone);
        }
        initTheme();

        const palettes = ['linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%)', 'linear-gradient(120deg, #f093fb 0%, #f5576c 100%)', 'linear-gradient(120deg, #d4fc79 0%, #96e6a1 100%)', 'linear-gradient(to top, #a8edea 0%, #fed6e3 100%)', 'linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%)'];
        const darkPalettes = ['linear-gradient(to top, #0f2027, #203a43, #2c5364)', 'linear-gradient(to right, #141e30, #243b55)', 'linear-gradient(to right, #11998e, #38ef7d)', 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)', 'linear-gradient(135deg, #1f2937 0%, #111827 100%)'];
        function hashCode(str) { let hash = 0; for(let i=0;i<str.length;i++) hash = ((hash<<5)-hash)+str.charCodeAt(i); return Math.abs(hash); }
        function applyDynamicBackground(target) {
            const arr = document.documentElement.classList.contains('dark') ? darkPalettes : palettes;
            document.getElementById('chat-bg-gradient').style.background = arr[hashCode(target) % arr.length];
        }
            // --- SISTEM AUTENTIKASI ---
        const initAuth = async () => {
            try { await signInAnonymously(auth); } 
            catch (error) { document.getElementById('loading-text').innerText = "Gagal terhubung ke Database. Cek aturan Firestore."; }
        };
        initAuth();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                if (myPhoneNumber) {
                    document.getElementById('my-phone-display').innerText = myPhoneNumber;
                    switchScreen('home');
                    startRealtimeInbox();
                } else { switchScreen('login'); }
            }
        });

        // UI Switcher
        function switchScreen(screenId) {
            ['screen-loading', 'screen-login', 'screen-home', 'screen-chat'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById(`screen-${screenId}`).classList.remove('hidden');
            if(screenId !== 'loading') document.getElementById(`screen-${screenId}`).classList.add('flex');
        }

        window.login = function() {
            let phoneInput = document.getElementById('input-phone').value.replace(/\D/g, '');
            if (phoneInput.length < 4) return alert("Masukkan nomor valid.");
            myPhoneNumber = phoneInput; localStorage.setItem('sapa_phone', myPhoneNumber);
            document.getElementById('my-phone-display').innerText = myPhoneNumber;
            switchScreen('loading');
            setTimeout(() => { switchScreen('home'); startRealtimeInbox(); }, 500);
        };

        // --- DATABASE: DASHBOARD INBOX (SEKARANG FULL FIREBASE) ---
        let inboxDataCache = {};
        
        function startRealtimeInbox() {
            if (!currentUser || !myPhoneNumber) return;
            // Kita gunakan struktur koleksi "sapa_inbox_[nomor]" di level teratas
            const inboxRef = collection(db, `sapa_inbox_${myPhoneNumber}`);
            
            if (unsubscribeInbox) unsubscribeInbox();

            unsubscribeInbox = onSnapshot(inboxRef, (snapshot) => {
                let contacts = [];
                snapshot.forEach(doc => {
                    let data = doc.data();
                    let contactId = doc.id;
                    
                    let cachedTime = inboxDataCache[contactId]?.time || 0;
                    let newTime = data.timestamp ? data.timestamp.toMillis() : Date.now();
                    
                    // Notifikasi jika ada pesan baru
                    if (newTime > cachedTime && cachedTime !== 0 && data.lastSender !== myPhoneNumber && activeTargetPhone !== contactId) {
                        triggerNotification(contactId, data.lastMessage);
                    }

                    // Ambil nama dari Cache lokal HP jika ada
                    let localName = JSON.parse(localStorage.getItem('sapa_contacts') || '{}')[contactId] || '';
                    
                    contacts.push({ id: contactId, phone: contactId, name: localName, ...data, time: newTime });
                    inboxDataCache[contactId] = { time: newTime };
                });

                // Filter & Sortir secara memori (Mencegah Index Error Firebase)
                contacts.sort((a, b) => b.time - a.time);
                renderInbox(contacts);
            }, (error) => {
                console.error("Error Inbox Firebase:", error);
                alert("Database tertutup! Pastikan Aturan Firestore Anda 'allow read, write: if true;'");
            });
        }

        function renderInbox(contacts) {
            const listEl = document.getElementById('contact-list');
            listEl.innerHTML = '';
            
            if (contacts.length === 0) { document.getElementById('empty-inbox').style.display = 'block'; return; }
            document.getElementById('empty-inbox').style.display = 'none';

            contacts.forEach(contact => {
                const item = document.createElement('div');
                item.className = 'glass-panel p-4 rounded-2xl cursor-pointer hover:bg-white/80 dark:hover:bg-gray-800/80 transition-colors flex items-center mb-3 shadow-sm border border-gray-100 dark:border-gray-700';
                item.onclick = () => window.openChat(contact.phone);
                
                let timeStr = contact.timestamp ? contact.timestamp.toDate().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }) : '';
                const avatarColor = ['from-red-400 to-red-500', 'from-blue-400 to-blue-500', 'from-green-400 to-green-500', 'from-purple-400 to-purple-500'][hashCode(contact.phone) % 4];
                const displayName = contact.name || contact.phone;
                const isUnread = (contact.lastSender !== myPhoneNumber && contact.phone !== activeTargetPhone);
                const textClass = isUnread ? 'font-bold text-gray-900 dark:text-white' : 'text-gray-500 dark:text-gray-400';

                item.innerHTML = `
                    <div class="w-13 h-13 rounded-full bg-gradient-to-tr ${avatarColor} flex items-center justify-center text-white shrink-0 shadow-md w-12 h-12 text-lg font-bold">
                        ${displayName.charAt(0).toUpperCase()}
                    </div>
                    <div class="ml-4 flex-1 overflow-hidden">
                        <div class="flex justify-between items-baseline mb-1">
                            <h3 class="text-[16px] font-bold text-gray-900 dark:text-white truncate">${displayName}</h3>
                            <span class="text-[11px] text-gray-400 shrink-0 ml-2">${timeStr}</span>
                        </div>
                        <p class="text-[13px] ${textClass} truncate">${contact.lastMessage}</p>
                    </div>`;
                listEl.appendChild(item);
            });
        }

        // --- NOTIFIKASI ---
        function triggerNotification(senderPhone, message) {
            document.getElementById('notif-sound').play().catch(e=>e);
            let localName = JSON.parse(localStorage.getItem('sapa_contacts') || '{}')[senderPhone] || senderPhone;
            unreadNotifPhone = senderPhone;

            const notifEl = document.getElementById('in-app-notification');
            document.getElementById('notif-title').innerText = localName;
            document.getElementById('notif-body').innerText = message;
            notifEl.classList.replace('notif-hidden', 'notif-visible');
            setTimeout(() => notifEl.classList.replace('notif-visible', 'notif-hidden'), 4000);
            
            if ("Notification" in window && Notification.permission === "granted" && document.hidden) {
                new Notification(`Pesan dari ${localName}`, { body: message });
            }
        }
        window.clickNotification = function() {
            if(unreadNotifPhone) {
                document.getElementById('in-app-notification').classList.replace('notif-visible', 'notif-hidden');
                window.openChat(unreadNotifPhone);
            }
        };

        // --- MENU & MODAL ---
        window.showNewChatModal = () => document.getElementById('modal-new-chat').classList.replace('hidden', 'flex');
        window.hideNewChatModal = () => document.getElementById('modal-new-chat').classList.replace('flex', 'hidden');
        
        window.startNewChat = async () => {
            let targetPhone = document.getElementById('target-phone').value.replace(/\D/g, '');
            if (!targetPhone || !currentUser) return;
            
            // Simpan langsung ke Firebase agar masuk Inbox
            await setDoc(doc(db, `sapa_inbox_${myPhoneNumber}`, targetPhone), {
                lastMessage: 'Mulai obrolan...', lastSender: myPhoneNumber, timestamp: serverTimestamp()
            }, { merge: true });

            window.hideNewChatModal(); document.getElementById('target-phone').value = '';
            window.openChat(targetPhone);
        };

        window.openChat = (targetPhone) => {
            activeTargetPhone = targetPhone;
            let localName = JSON.parse(localStorage.getItem('sapa_contacts') || '{}')[targetPhone];
            
            document.getElementById('chat-title').innerText = localName || targetPhone;
            document.getElementById('chat-phone-subtitle').innerText = localName ? targetPhone : 'Online';
            
            applyDynamicBackground(targetPhone);
            switchScreen('chat');
            document.getElementById('message-input').value = '';
            renderStickerDrawer();
            
            startRealtimeMessages(targetPhone);
        };

        window.goBack = () => {
            activeTargetPhone = null; 
            if (unsubscribeMessages) unsubscribeMessages();
            switchScreen('home'); 
            document.getElementById('attachment-menu').classList.add('hidden');
            document.getElementById('sticker-drawer').classList.add('hidden');
        };

        window.showRenameModal = () => {
            document.getElementById('rename-input').value = JSON.parse(localStorage.getItem('sapa_contacts') || '{}')[activeTargetPhone] || '';
            document.getElementById('modal-rename').classList.replace('hidden', 'flex');
        };
        window.hideRenameModal = () => document.getElementById('modal-rename').classList.replace('flex', 'hidden');
        window.saveContactName = () => {
            const newName = document.getElementById('rename-input').value.trim();
            let contacts = JSON.parse(localStorage.getItem('sapa_contacts') || '{}');
            if(newName) contacts[activeTargetPhone] = newName; else delete contacts[activeTargetPhone];
            localStorage.setItem('sapa_contacts', JSON.stringify(contacts));
            
            document.getElementById('chat-title').innerText = newName || activeTargetPhone;
            document.getElementById('chat-phone-subtitle').innerText = newName ? activeTargetPhone : 'Online';
            window.hideRenameModal();
            startRealtimeInbox(); // Refresh dashboard
        };
             // --- DATABASE: CHAT (FULL FIREBASE REALTIME) ---
        function startRealtimeMessages(targetPhone) {
            const chatId = [myPhoneNumber, targetPhone].sort().join('_');
            const messagesRef = collection(db, `sapa_chats_${chatId}`);

            if (unsubscribeMessages) unsubscribeMessages();

            unsubscribeMessages = onSnapshot(messagesRef, (snapshot) => {
                let msgs = [];
                snapshot.forEach(doc => msgs.push({ id: doc.id, ...doc.data() }));
                
                msgs.sort((a, b) => {
                    let timeA = a.timestamp ? a.timestamp.toMillis() : Date.now();
                    let timeB = b.timestamp ? b.timestamp.toMillis() : Date.now();
                    return timeA - timeB;
                });

                const listEl = document.getElementById('messages-list');
                listEl.innerHTML = '';
                msgs.forEach(msg => {
                    let isMe = msg.sender === myPhoneNumber;
                    let timeStr = msg.timestamp ? msg.timestamp.toDate().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }) : '...';
                    renderSingleMessage(msg, isMe, timeStr);
                });
                setTimeout(() => { listEl.scrollTop = listEl.scrollHeight; }, 100);
            });
        }

        window.sendTextMessage = () => {
            const text = document.getElementById('message-input').value.trim();
            if (!text || !activeTargetPhone) return;
            document.getElementById('message-input').value = '';
            processSendMessage(text, 'text');
        };

        window.sendMediaMessage = (content, type) => {
            if (!activeTargetPhone) return;
            if (type.includes('sticker')) window.toggleStickerDrawer();
            processSendMessage(content, type);
        };

        async function processSendMessage(content, type) {
            const chatId = [myPhoneNumber, activeTargetPhone].sort().join('_');
            const messagesRef = collection(db, `sapa_chats_${chatId}`);
            
            let lastMsgText = type === 'text' ? content : (type === 'image' ? '📷 Foto' : (type === 'video' ? '🎥 Video' : (type === 'document' ? '📄 Dokumen' : '🤩 Stiker')));

            // Ganti tombol send jadi loading spinner
            const sendBtn = document.getElementById('send-btn');
            sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            try {
                await addDoc(messagesRef, { type: type, content: content, sender: myPhoneNumber, timestamp: serverTimestamp() });
                
                // Update Inbox Pengirim (Saya)
                await setDoc(doc(db, `sapa_inbox_${myPhoneNumber}`, activeTargetPhone), {
                    lastMessage: lastMsgText, lastSender: myPhoneNumber, timestamp: serverTimestamp()
                }, { merge: true });

                // Update Inbox Penerima (Teman)
                await setDoc(doc(db, `sapa_inbox_${activeTargetPhone}`, myPhoneNumber), {
                    lastMessage: lastMsgText, lastSender: myPhoneNumber, timestamp: serverTimestamp()
                }, { merge: true });

            } catch (error) {
                console.error("Gagal mengirim pesan:", error);
                alert("Pengiriman gagal! Kemungkinan ukuran file terlalu besar (Batas Firestore Document: 1MB).");
            }

            // Kembalikan tombol send
            sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i>';
        }

        // --- FILE UPLOAD (DENGAN KOMPRESI UNTUK MENCEGAH FIREBASE ERROR) ---
        window.toggleAttachmentMenu = () => { document.getElementById('sticker-drawer').classList.add('hidden'); document.getElementById('attachment-menu').classList.toggle('hidden'); };
        window.toggleStickerDrawer = () => { document.getElementById('attachment-menu').classList.add('hidden'); document.getElementById('sticker-drawer').classList.toggle('hidden'); };

        window.handleFileUpload = function(event, type) {
            const file = event.target.files[0];
            if(!file) return;
            
            // Batas Firestore adalah 1MB per dokumen. Kita beri batasan 700KB.
            if(file.size > 800 * 1024 && type !== 'image') {
                alert("Batas maksimal Video/Dokumen adalah 800 KB karena Firebase Database memiliki batas limit text Base64 1MB per pesan.");
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                if (type === 'image') {
                    // Kompresi Gambar agar lolos limit 1MB Firebase
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        let w = img.width, h = img.height;
                        const maxDim = 600; 
                        if (w > maxDim || h > maxDim) {
                            const ratio = Math.min(maxDim/w, maxDim/h);
                            w *= ratio; h *= ratio;
                        }
                        canvas.width = w; canvas.height = h;
                        ctx.drawImage(img, 0, 0, w, h);
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6); 
                        window.sendMediaMessage(compressedBase64, 'image');
                    };
                    img.src = e.target.result;
                } 
                else if (type === 'document') {
                    const docData = `${file.name}|${e.target.result}`;
                    window.sendMediaMessage(docData, 'document');
                } else {
                    window.sendMediaMessage(e.target.result, type);
                }
            };
            reader.readAsDataURL(file);
            event.target.value = '';
        };

        // --- STIKER CUSTOM ---
        const defaultEmojiStickers = ['🐶','🫦','❤️','😂','🔥','🥳','😎','👍','🚀','🐼','👻','💩','👽'];
        function renderStickerDrawer() {
            const grid = document.getElementById('sticker-grid');
            while (grid.children.length > 1) { grid.removeChild(grid.lastChild); } 
            
            let customStickers = JSON.parse(localStorage.getItem('sapa_custom_stickers') || '[]');
            customStickers.forEach(base64Image => {
                const btn = document.createElement('button');
                btn.className = 'w-16 h-16 hover:scale-110 active:scale-90 transition-transform flex items-center justify-center shrink-0';
                btn.onclick = () => window.sendMediaMessage(base64Image, 'custom_sticker');
                btn.innerHTML = `<img src="${base64Image}" class="w-full h-full object-contain filter drop-shadow-md rounded-lg">`;
                grid.appendChild(btn);
            });
            defaultEmojiStickers.forEach(emoji => {
                const btn = document.createElement('button');
                btn.className = 'text-5xl hover:scale-110 active:scale-90 transition-transform w-16 h-16 flex items-center justify-center shrink-0';
                btn.onclick = () => window.sendMediaMessage(emoji, 'sticker');
                btn.innerText = emoji;
                grid.appendChild(btn);
            });
        }

        window.handleCustomStickerUpload = function(event) {
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    const maxDim = 200; 
                    if (w > maxDim || h > maxDim) {
                        const ratio = Math.min(maxDim/w, maxDim/h);
                        w *= ratio; h *= ratio;
                    }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    let customStickers = JSON.parse(localStorage.getItem('sapa_custom_stickers') || '[]');
                    customStickers.unshift(canvas.toDataURL('image/webp', 0.8));
                    localStorage.setItem('sapa_custom_stickers', JSON.stringify(customStickers));
                    renderStickerDrawer(); 
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
            event.target.value = '';
        };

        // --- RENDERER VISUAL PESAN ---
        function renderSingleMessage(msg, isMe, timeStr) {
            const listEl = document.getElementById('messages-list');
            const wrapperDiv = document.createElement('div');
            wrapperDiv.className = `flex w-full ${isMe ? 'justify-end' : 'justify-start'}`;
            
            const bgClass = isMe ? 'bg-sapa-light text-white' : 'bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100';
            const borderClass = isMe ? 'border-sapa-dark/20' : 'border-white/50 dark:border-gray-700/50';
            const radiusClass = isMe ? 'rounded-2xl rounded-tr-sm' : 'rounded-2xl rounded-tl-sm';
            
            let innerHTML = '';
            if (msg.type === 'text') {
                innerHTML = `<div class="${bgClass} ${radiusClass} ${borderClass} border px-4 py-2.5 max-w-[80%] shadow-md relative group backdrop-blur-md"><p class="text-[15px] font-medium break-words leading-relaxed pr-10">${msg.content}</p><span class="text-[10px] opacity-70 absolute bottom-1.5 right-2 flex items-center font-semibold">${timeStr}</span></div>`;
            } else if (msg.type === 'image') {
                innerHTML = `<div class="${bgClass} ${radiusClass} ${borderClass} border p-1 max-w-[70%] shadow-md relative group backdrop-blur-md media-bubble"><img src="${msg.content}"><span class="text-[10px] text-white bg-black/40 px-1.5 rounded absolute bottom-2 right-2 flex items-center font-semibold backdrop-blur-sm">${timeStr}</span></div>`;
            } else if (msg.type === 'video') {
                innerHTML = `<div class="${bgClass} ${radiusClass} ${borderClass} border p-1 max-w-[70%] shadow-md relative group backdrop-blur-md media-bubble"><video controls src="${msg.content}"></video><span class="text-[10px] text-white bg-black/40 px-1.5 rounded absolute bottom-2 right-2 flex items-center font-semibold backdrop-blur-sm">${timeStr}</span></div>`;
            } else if (msg.type === 'document') {
                const separatorIndex = msg.content.indexOf('|');
                let fileName = "Dokumen"; let fileUrl = msg.content;
                if(separatorIndex > -1) { fileName = msg.content.substring(0, separatorIndex); fileUrl = msg.content.substring(separatorIndex + 1); }
                innerHTML = `<div class="${bgClass} ${radiusClass} ${borderClass} border p-3 max-w-[80%] shadow-md relative group backdrop-blur-md flex items-center gap-3"><div class="w-10 h-10 bg-black/10 rounded-lg flex items-center justify-center shrink-0"><i class="fas fa-file-alt text-xl"></i></div><div class="flex-1 overflow-hidden pr-8"><p class="text-sm font-bold truncate">${fileName}</p><a href="${fileUrl}" download="${fileName}" class="text-[11px] opacity-80 underline hover:text-white">Unduh File</a></div><span class="text-[10px] opacity-70 absolute bottom-1.5 right-2 flex items-center font-semibold">${timeStr}</span></div>`;
            } else if (msg.type === 'sticker') {
                innerHTML = `<div class="max-w-[50%] relative group"><div class="sticker-bubble">${msg.content}</div><span class="text-[10px] text-gray-500 absolute -bottom-4 ${isMe ? 'right-0' : 'left-0'} font-semibold bg-white/50 px-1 rounded-md">${timeStr}</span></div>`;
            } else if (msg.type === 'custom_sticker') {
                innerHTML = `<div class="max-w-[50%] relative group"><img src="${msg.content}" class="custom-sticker-bubble"><span class="text-[10px] text-gray-500 absolute -bottom-4 ${isMe ? 'right-0' : 'left-0'} font-semibold bg-white/50 px-1 rounded-md">${timeStr}</span></div>`;
            }
            wrapperDiv.innerHTML = innerHTML;
            listEl.appendChild(wrapperDiv);
        }
    </script>
</body>
</html>
